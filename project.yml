name: CustomSoundAlarm
options:
  bundleIdPrefix: com.tkysdev
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true
  developmentLanguage: en
  knownRegions:
    - en
    - ja

packages:
  PostHog:
    url: https://github.com/PostHog/posthog-ios.git
    from: 3.56.0

settings:
  base:
    SWIFT_VERSION: "6.2"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "2"
    DEVELOPMENT_TEAM: "F8ZP855SM2"
    GENERATE_INFOPLIST_FILE: true
    SWIFT_EMIT_LOC_STRINGS: true

targets:
  CustomSoundAlarm:
    type: application
    platform: iOS
    sources:
      - path: CustomSoundAlarm
        excludes:
          - "**/.DS_Store"
          - Info.plist
      - path: Shared
    info:
      path: CustomSoundAlarm/Info.plist
      properties:
        CFBundleDisplayName: My Sound Alarm
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~iPhone:
          - UIInterfaceOrientationPortrait
        NSAlarmKitUsageDescription: "お気に入りの音でアラームを鳴らすために使用します。"
        NSMicrophoneUsageDescription: "アラーム音を録音するためにマイクを使用します。"
        NSPhotoLibraryUsageDescription: "動画から音声を抽出するためにフォトライブラリを使用します。"
        UIBackgroundModes:
          - audio
        PostHogAPIKey: $(POSTHOG_API_KEY)
        PostHogHost: $(POSTHOG_HOST)
        PostHogDebug: $(POSTHOG_DEBUG)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tkysdev.customsoundalarm
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    scheme:
      testTargets:
        - CustomSoundAlarmTests
      gatherCoverageData: true
    dependencies:
      - target: CustomSoundAlarmWidget
        embed: true
      - target: ShareExtension
        embed: true
      - package: PostHog
    entitlements:
      path: CustomSoundAlarm/CustomSoundAlarm.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.tkysdev.customsoundalarm

  CustomSoundAlarmWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: CustomSoundAlarmWidget
      - path: Shared
    info:
      path: CustomSoundAlarmWidget/Info.plist
      properties:
        CFBundleDisplayName: My Sound Alarm Widget
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tkysdev.customsoundalarm.widget
        GENERATE_INFOPLIST_FILE: false
    entitlements:
      path: CustomSoundAlarmWidget/CustomSoundAlarmWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.tkysdev.customsoundalarm

  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
      - path: Shared
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: My Sound Alarm
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule: "SUBQUERY(extensionItems, $item, SUBQUERY($item.attachments, $att, ANY $att.registeredTypeIdentifiers UTI-CONFORMS-TO \"public.audio\" OR ANY $att.registeredTypeIdentifiers UTI-CONFORMS-TO \"public.movie\").@count > 0).@count > 0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tkysdev.customsoundalarm.share
        GENERATE_INFOPLIST_FILE: false
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.tkysdev.customsoundalarm

  CustomSoundAlarmTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CustomSoundAlarmTests
    dependencies:
      - target: CustomSoundAlarm
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
